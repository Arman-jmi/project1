<html>
<head>
    <title>FWI Prediction</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <style>
        body{
            background-color: #f4f4f4;
            font-family: Arial, sans-serif;
        }

        .login{
            width: 40%;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        h1{
            text-align: center;
            margin-bottom: 25px;
        }

        input{
            margin-bottom: 15px;
        }

        h2{
            text-align: center;
            color: green;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <div class="login">

        <h1>FWI Prediction</h1>

        <!-- Main Input For Receiving Query to our ML -->
        <form action="{{ url_for('predict_datapoint') }}" method="post">

            <input type="text" name="Temperature"
                placeholder="Temperature" required="required"
                class="form-control"/>

            <input type="text" name="RH"
                placeholder="RH" required="required"
                class="form-control"/>

            <input type="text" name="Ws"
                placeholder="Ws" required="required"
                class="form-control"/>

            <input type="text" name="Rain"
                placeholder="Rain" required="required"
                class="form-control"/>

            <input type="text" name="FFMC"
                placeholder="FFMC" required="required"
                class="form-control"/>

            <input type="text" name="DMC"
                placeholder="DMC" required="required"
                class="form-control"/>

            <input type="text" name="ISI"
                placeholder="ISI" required="required"
                class="form-control"/>

            <input type="text" name="Classes"
                placeholder="Classes" required="required"
                class="form-control"/>

            <input type="text" name="Region"
                placeholder="Region" required="required"
                class="form-control"/>

            <button type="submit"
                class="btn btn-primary btn-block btn-lg">
                Predict
            </button>

        </form>

        <h2>
            THE FWI prediction is {{ results }}
        </h2>

    </div>

</body>
</html>
